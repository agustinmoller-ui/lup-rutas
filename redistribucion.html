<head>

<title>LUP — Rutas v2.1</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0f1117;color:#fff;height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{background:#1a1d2e;padding:7px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #2d3148;flex-shrink:0;flex-wrap:wrap}
.logo{font-size:14px;font-weight:800;letter-spacing:2px;white-space:nowrap}.logo span{color:#6c63ff}
.toggle-wrap{display:flex;background:#0f1117;border-radius:20px;padding:3px;gap:2px}
.tbtn{padding:4px 12px;border-radius:16px;border:none;cursor:pointer;font-size:11px;font-weight:700;transition:all .15s}
.tbtn.on{background:#6c63ff;color:#fff}.tbtn:not(.on){background:transparent;color:#555}
.rutas-bar{display:flex;gap:6px;flex-wrap:wrap;align-items:center;flex:1}
.ruta-slot{display:flex;align-items:center;gap:4px;background:#252840;border-radius:8px;padding:4px 7px}
.ruta-slot label{font-size:9px;color:#666;text-transform:uppercase;letter-spacing:.4px}
.color-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.slot-count{font-size:11px;font-weight:700;min-width:20px;text-align:center}
.clear-btn{background:transparent;border:none;color:#555;font-size:11px;cursor:pointer}.clear-btn:hover{color:#ef4444}
.add-btn{background:#252840;border:1px dashed #3d4168;color:#888;border-radius:8px;padding:4px 10px;font-size:11px;cursor:pointer;white-space:nowrap}
.add-btn:hover{border-color:#6c63ff;color:#6c63ff}
.cb-group{display:flex;gap:3px;flex-wrap:wrap}
.cb-label{display:flex;align-items:center;gap:2px;font-size:10px;cursor:pointer;padding:2px 5px;border-radius:10px;border:1px solid #3d4168;transition:all .12s;user-select:none;white-space:nowrap}
.cb-label:hover{border-color:#6c63ff}.cb-label input{display:none}
.cb-label.checked{background:#6c63ff22;border-color:#6c63ff;color:#a5b4fc}
#map{flex:1}

/* MODE BAR */
.mode-bar{position:absolute;top:70px;left:10px;z-index:1000;display:flex;flex-direction:column;gap:5px}
.mode-btn{width:34px;height:34px;border-radius:8px;border:1px solid #3d4168;background:#1a1d2e;color:#888;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;title:attr(title)}
.mode-btn:hover{border-color:#6c63ff;color:#6c63ff}
.mode-btn.active{background:#6c63ff22;border-color:#6c63ff;color:#a5b4fc}

/* INFO PANEL */
.info-panel{position:absolute;top:70px;right:10px;z-index:1000;background:#1a1d2eee;backdrop-filter:blur(8px);border-radius:12px;padding:11px;width:200px;border:1px solid #2d3148;font-size:12px}
.ip-title{font-size:9px;text-transform:uppercase;color:#666;letter-spacing:1px;margin-bottom:7px}
.ip-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.ip-label{display:flex;align-items:center;gap:5px}
.ip-count{font-weight:700}
hr.div{border:none;border-top:1px solid #2d3148;margin:7px 0}

/* EDIT PANEL */
.edit-panel{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);z-index:2000;
  background:#1a1d2e;border:1px solid #6c63ff66;border-radius:14px;padding:12px 16px;
  display:flex;align-items:center;gap:10px;box-shadow:0 4px 30px #0009;flex-wrap:wrap;min-width:380px}
.edit-panel.hidden{display:none}
.ep-lbl{font-size:11px;color:#888;white-space:nowrap}
.ep-cnt{font-size:13px;font-weight:700;color:#facc15}
.ep-sel{background:#0f1117;color:#fff;border:1px solid #3d4168;border-radius:6px;padding:3px 7px;font-size:12px;cursor:pointer}
.ep-btn{padding:5px 12px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer}
.ep-apply{background:#6c63ff;color:#fff}.ep-apply:hover{background:#7c73ff}
.ep-cancel{background:#252840;color:#888}.ep-cancel:hover{color:#fff}

/* CAMBIOS PANEL */
.cambios-panel{position:absolute;bottom:16px;right:10px;z-index:1000;background:#1a1d2eee;backdrop-filter:blur(6px);border-radius:12px;padding:11px;width:215px;border:1px solid #22c55e44;font-size:11px;max-height:230px;overflow-y:auto}
.cambios-panel.hidden{display:none}
.cp-title{font-size:9px;text-transform:uppercase;color:#22c55e;letter-spacing:1px;margin-bottom:7px}
.cp-row{border-bottom:1px solid #2d3148;padding:3px 0;display:flex;justify-content:space-between;align-items:center;gap:3px}
.cp-del{background:none;border:none;color:#555;cursor:pointer;font-size:10px}.cp-del:hover{color:#ef4444}
.cp-export{margin-top:8px;width:100%;padding:5px;background:#22c55e22;border:1px solid #22c55e66;color:#4ade80;border-radius:7px;font-size:11px;cursor:pointer;font-weight:700}
.cp-export:hover{background:#22c55e44}

/* Popup */
.leaflet-popup-content-wrapper{background:#1a1d2e;border:1px solid #2d3148;border-radius:10px;color:#fff;box-shadow:0 4px 20px #0009}
.leaflet-popup-tip{background:#1a1d2e}
.pu-title{font-weight:700;font-size:13px;margin-bottom:4px;line-height:1.3}
.pu-row{font-size:11px;color:#888;margin-bottom:2px}.pu-row b{color:#fff}
.pu-badge{display:inline-block;margin-top:4px;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:700;margin-right:3px}
.b-c1{background:#f59e0b22;color:#fbbf24}.b-c2{background:#3b82f622;color:#60a5fa}.b-c3{background:#6b728022;color:#9ca3af}.b-c4{background:#a855f722;color:#c084fc}
.b-mg{background:#22c55e22;color:#4ade80;border:1px solid #22c55e44}
.pu-sbtn{margin-top:5px;padding:3px 10px;background:#6c63ff22;border:1px solid #6c63ff66;color:#a5b4fc;border-radius:6px;font-size:11px;cursor:pointer}
.pu-sbtn:hover{background:#6c63ff44}

/* VERSIONES PANEL */
.ver-panel{position:absolute;top:70px;left:55px;z-index:1000;background:#1a1d2eee;backdrop-filter:blur(8px);border-radius:12px;padding:11px;width:240px;border:1px solid #6c63ff44;font-size:11px;max-height:320px;overflow-y:auto}
.ver-panel.hidden{display:none}
.ver-title{font-size:9px;text-transform:uppercase;color:#6c63ff;letter-spacing:1px;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center}
.ver-row{border-bottom:1px solid #2d3148;padding:5px 0;display:flex;justify-content:space-between;align-items:center;gap:4px}
.ver-info{flex:1;min-width:0}
.ver-nombre{font-weight:700;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ver-fecha{color:#555;font-size:10px;margin-top:1px}
.ver-actions{display:flex;gap:4px;flex-shrink:0}
.ver-load{background:#6c63ff22;border:1px solid #6c63ff66;color:#a5b4fc;border-radius:5px;padding:2px 7px;cursor:pointer;font-size:11px}
.ver-load:hover{background:#6c63ff44}
.ver-del{background:none;border:none;color:#555;cursor:pointer;font-size:11px}.ver-del:hover{color:#ef4444}
.ver-save-btn{margin-top:8px;width:100%;padding:5px;background:#6c63ff22;border:1px solid #6c63ff66;color:#a5b4fc;border-radius:7px;font-size:11px;cursor:pointer;font-weight:700}
.ver-save-btn:hover{background:#6c63ff44}
/* TOAST */
#toast-msg{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1d2e;border:1px solid #6c63ff;color:#a5b4fc;padding:8px 16px;border-radius:20px;font-size:12px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
#toast-msg.toast-show{opacity:1}

</style>
</head>

<header>

  <button class="ep-btn ep-cancel" onclick="clearSelection()">✕ Limpiar</button>
</div>

<div class="cambios-panel hidden" id="cambios-panel">

</div>

// build: 2026-05-15
const CAMIONES=['C1','C2','C3','C4'], SEMANAS=['1','2'], DIAS=['Lunes','Martes','Miercoles','Jueves','Viernes'];
const COLORS=['#3b82f6','#a855f7','#22c55e','#f59e0b','#ef4444','#06b6d4','#ec4899','#f97316'];

let map=L.map('map').setView([-33.62,-70.72],10);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'&copy; CARTO',subdomains:'abcd',maxZoom:19}).addTo(map);
let layer=L.layerGroup().addTo(map);
let vista='antes', slots=[], nextId=0, mode='none';
let selected=new Set(), cambios=[];
let workingData=JSON.parse(JSON.stringify(ANTES_DATA));
let boxStart=null, boxRect=null;

function getData(){return vista==='antes'?workingData:JSON.parse(JSON.stringify(DESPUES_DATA));}

function addSlot(cams=[],sems=[],dias=[]){
  const id=nextId++, color=COLORS[slots.length%COLORS.length];
  slots.push({id,cams,sems,dias,color});
  renderBar(); renderMap();
}

function removeSlot(id){slots=slots.filter(s=>s.id!==id);renderBar();renderMap();}

function toggleCb(sid,field,val){
  const s=slots.find(s=>s.id===sid); if(!s) return;
  const i=s[field].indexOf(val);
  if(i>=0)s[field].splice(i,1); else s[field].push(val);
  renderBar(); renderMap();
}

function renderBar(){
  document.getElementById('rutas-bar').innerHTML=slots.map(s=>`
    <div class="ruta-slot">
      <div class="color-dot" style="background:${s.color}"></div>
      <label>Camión</label>
      <div class="cb-group">${CAMIONES.map(c=>`<span class="cb-label ${s.cams.includes(c)?'checked':''}" onclick="toggleCb(${s.id},'cams','${c}')">${c}</span>`).join('')}</div>
      <label>Sem</label>
      <div class="cb-group">${SEMANAS.map(v=>`<span class="cb-label ${s.sems.includes(v)?'checked':''}" onclick="toggleCb(${s.id},'sems','${v}')">S${v}</span>`).join('')}</div>
      <label>Día</label>
      <div class="cb-group">${DIAS.map(d=>`<span class="cb-label ${s.dias.includes(d)?'checked':''}" onclick="toggleCb(${s.id},'dias','${d}')">${d.slice(0,3)}</span>`).join('')}</div>
      <span class="slot-count" id="cnt-${s.id}" style="color:${s.color}">0</span>
      <button class="clear-btn" onclick="removeSlot(${s.id})">✕</button>
    </div>`).join('');
}

function matchesSlot(p,s){
  if(s.cams.length&&!s.cams.includes(p.camion)) return false;
  if(s.sems.length&&!s.sems.includes(p.semana)) return false;
  if(s.dias.length&&!s.dias.includes(p.dia)) return false;
  return true;
}

function renderMap(){
  layer.clearLayers();
  const data=getData(), counts={};
  slots.forEach(s=>{counts[s.id]=0;});
  data.forEach(p=>{
    let ms=null;
    for(const s of slots){
      if(!s.cams.length&&!s.sems.length&&!s.dias.length) continue;
      if(matchesSlot(p,s)){ms=s;break;}
    }
    if(!ms) return;
    const isSel=selected.has(p.codigo);
    const mg=vista==='despues'&&p.migrado;
    const col=isSel?'#facc15':(mg?lighten(ms.color):ms.color);
    const m=L.circleMarker([p.lat,p.lng],{radius:isSel?9:(mg?8:6),fillColor:col,color:isSel?'#fff':col,weight:isSel?2:(mg?1.5:0.5),fillOpacity:isSel?1:0.85});
    const bc='b-'+p.camion.toLowerCase();
    m.bindPopup(`<div class="pu-title">${p.nombre}</div>
      <div class="pu-row">RUT: <b>${p.codigo}</b></div>
      <div class="pu-row">Camión: <b>${p.camion}</b> · S${p.semana} <b>${p.dia}</b></div>
      <div class="pu-row">Dirección: <b>${p.direccion||'-'}</b></div>
      <div class="pu-row">Comuna: <b>${p.comuna||'-'}</b></div>
      <span class="pu-badge ${bc}">${p.camion}</span>${mg?'<span class="pu-badge b-mg">⭐ Migrado</span>':''}
      <br><button class="pu-sbtn" onclick="toggleSel('${p.codigo}')">${isSel?'✓ Deseleccionar':'+ Seleccionar'}</button>`);
    m.on('click',e=>{if(mode==='pointer'){L.DomEvent.stopPropagation(e);toggleSel(p.codigo);}});
    layer.addLayer(m);
    counts[ms.id]++;
  });
  slots.forEach(s=>{const el=document.getElementById('cnt-'+s.id);if(el)el.textContent=counts[s.id]||0;});
  updateInfoPanel(counts); updateEditPanel();
}

function fitToVisible(){
  const data=getData();
  const pts=[];
  data.forEach(p=>{
    for(const s of slots){
      if(!s.cams.length&&!s.sems.length&&!s.dias.length) continue;
      if(matchesSlot(p,s)){pts.push([p.lat,p.lng]);break;}
    }
  });
  if(pts.length>0) map.fitBounds(L.latLngBounds(pts).pad(0.08));
}

function lighten(hex){
  try{const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16),m=v=>Math.round(v+(255-v)*.5);return'rgb('+m(r)+','+m(g)+','+m(b)+')';}catch(e){return hex;}
}

function toggleSel(codigo){
  if(selected.has(codigo))selected.delete(codigo); else selected.add(codigo);
  map.closePopup(); renderMap();
}

function clearSelection(){selected.clear();renderMap();}

function updateEditPanel(){
  const ep=document.getElementById('edit-panel');
  document.getElementById('ep-cnt').textContent=selected.size;
  if(selected.size>0)ep.classList.remove('hidden'); else ep.classList.add('hidden');
}

function setMode(m){
  mode=m;
  ['none','pointer','box'].forEach(x=>document.getElementById('mb-'+x).classList.toggle('active',x===m));
  map.dragging[m==='box'?'disable':'enable']();
  map.getContainer().style.cursor=m==='pointer'?'crosshair':(m==='box'?'crosshair':'');
}

map.on('mousedown',e=>{if(mode!=='box')return;boxStart=e.latlng;if(boxRect){map.removeLayer(boxRect);boxRect=null;}});
map.on('mousemove',e=>{
  if(mode!=='box'||!boxStart)return;
  const b=L.latLngBounds(boxStart,e.latlng);
  if(boxRect)map.removeLayer(boxRect);
  boxRect=L.rectangle(b,{color:'#6c63ff',weight:1.5,fillOpacity:0.1,dashArray:'5,5'});
  boxRect.addTo(map);
});
map.on('mouseup',e=>{
  if(mode!=='box'||!boxStart)return;
  const b=L.latLngBounds(boxStart,e.latlng);
  if(boxRect){map.removeLayer(boxRect);boxRect=null;}
  boxStart=null;
  const data=getData();
  data.forEach(p=>{
    if(!b.contains([p.lat,p.lng]))return;
    const vis=slots.some(s=>{if(!s.cams.length&&!s.sems.length&&!s.dias.length)return false;return matchesSlot(p,s);});
    if(vis)selected.add(p.codigo);
  });
  renderMap();
});

function applyEdit(){
  const cam=document.getElementById('ep-cam').value;
  const sem=document.getElementById('ep-sem').value;
  const dia=document.getElementById('ep-dia').value;
  if(!cam&&!sem&&!dia){alert('Selecciona al menos un campo para cambiar');return;}
  selected.forEach(codigo=>{
    const entry=workingData.find(p=>p.codigo===codigo);
    if(!entry)return;
    const de={cam:entry.camion,sem:entry.semana,dia:entry.dia};
    if(cam)entry.camion=cam;
    if(sem)entry.semana=sem;
    if(dia)entry.dia=dia;
    const a={cam:entry.camion,sem:entry.semana,dia:entry.dia};
    const ex=cambios.find(c=>c.codigo===codigo);
    if(ex)ex.a=a; else cambios.push({codigo,nombre:entry.nombre,de,a});
  });
  selected.clear();
  document.getElementById('ep-cam').value='';
  document.getElementById('ep-sem').value='';
  document.getElementById('ep-dia').value='';
  renderMap(); updateCambiosPanel();
}

function updateCambiosPanel(){
  const panel=document.getElementById('cambios-panel');
  const list=document.getElementById('cp-list');
  if(!cambios.length){panel.classList.add('hidden');return;}
  panel.classList.remove('hidden');
  list.innerHTML=cambios.map((c,i)=>`
    <div class="cp-row">
      <span style="max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:10px">${c.nombre}</span>
      <span style="color:#888;font-size:10px">${c.de.cam}</span>
      <span style="color:#6c63ff">→</span>
      <span style="color:#a5b4fc;font-size:10px">${c.a.cam} S${c.a.sem} ${c.a.dia?c.a.dia.slice(0,3):'?'}</span>
      <button class="cp-del" onclick="undoCambio(${i})">✕</button>
    </div>`).join('');
}

function undoCambio(i){
  const c=cambios[i];
  const entry=workingData.find(p=>p.codigo===c.codigo);
  if(entry){entry.camion=c.de.cam;entry.semana=c.de.sem;entry.dia=c.de.dia;}
  cambios.splice(i,1); updateCambiosPanel(); renderMap();
}

function exportarCambios(){
  const blob=new Blob([JSON.stringify(cambios,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='cambios_rutas_lup.json';a.click();
  URL.revokeObjectURL(url);
}

function updateInfoPanel(counts){
  const el=document.getElementById('ip-content');
  if(!slots.length){el.innerHTML='<div style="color:#555;font-size:11px">Agrega una ruta arriba</div>';return;}
  el.innerHTML=slots.map(s=>{
    const lbl=[(s.cams.join('/')||'Todos'),(s.sems.map(x=>'S'+x).join('/')||'S*'),(s.dias.map(x=>x.slice(0,3)).join('/')||'Todos')].join(' ');
    return`<div class="ip-row"><div class="ip-label"><div class="color-dot" style="background:${s.color}"></div><span>${lbl}</span></div><span class="ip-count" style="color:${s.color}">${counts[s.id]||0}</span></div>`;
  }).join('')+(selected.size?`<hr class="div"><div style="color:#facc15;font-size:11px">⭐ ${selected.size} seleccionados</div>`:'')
  +(vista==='despues'?'<hr class="div"><div style="color:#22c55e;font-size:11px">Verde claro = migrado C3</div>':'');
}

function setVista(v){
  vista=v;selected.clear();
  document.getElementById('btn-a').className='tbtn'+(v==='antes'?' on':'');
  document.getElementById('btn-d').className='tbtn'+(v==='despues'?' on':'');
  renderMap();
}

// SISTEMA DE VERSIONES — localStorage
// ============================================================
const LS_KEY = 'lup_rutas_versiones';

function getVersiones() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || []; }
  catch(e) { return []; }
}

function saveVersiones(versiones) {
  localStorage.setItem(LS_KEY, JSON.stringify(versiones));
}

function guardarVersion() {
  const nombre = prompt('Nombre de la versión (ej: "Borrador 13 mayo"):');
  if (!nombre) return;
  const versiones = getVersiones();
  const snapshot = {
    id: Date.now(),
    nombre: nombre.trim(),
    fecha: new Date().toLocaleString('es-CL', {timeZone:'America/Santiago'}),
    workingData: JSON.parse(JSON.stringify(workingData)),
    cambios: JSON.parse(JSON.stringify(cambios))
  };
  versiones.unshift(snapshot); // más reciente primero
  if (versiones.length > 20) versiones.pop(); // máx 20 versiones
  saveVersiones(versiones);
  mostrarToast('✅ Versión guardada: ' + snapshot.nombre);
  renderVersionesPanel();
}

function cargarVersion(id) {
  const versiones = getVersiones();
  const v = versiones.find(x => x.id === id);
  if (!v) return;
  if (!confirm('¿Cargar versión "' + v.nombre + '"? Se perderán los cambios no guardados.')) return;
  workingData = JSON.parse(JSON.stringify(v.workingData));
  cambios = JSON.parse(JSON.stringify(v.cambios));
  updateCambiosPanel();
  renderMap();
  mostrarToast('📂 Versión cargada: ' + v.nombre);
}

function eliminarVersion(id) {
  let versiones = getVersiones();
  versiones = versiones.filter(x => x.id !== id);
  saveVersiones(versiones);
  renderVersionesPanel();
}

function renderVersionesPanel() {
  const versiones = getVersiones();
  const list = document.getElementById('ver-list');
  if (!versiones.length) {
    list.innerHTML = '<div style="color:#555;font-size:11px">Sin versiones guardadas</div>';
    return;
  }
  list.innerHTML = versiones.map(v => `
    <div class="ver-row">
      <div class="ver-info">
        <div class="ver-nombre">${v.nombre}</div>
        <div class="ver-fecha">${v.fecha} · ${v.cambios.length} cambios</div>
      </div>
      <div class="ver-actions">
        <button class="ver-load" onclick="cargarVersion(${v.id})">▶</button>
        <button class="ver-del" onclick="eliminarVersion(${v.id})">✕</button>
      </div>
    </div>
  `).join('');
}

function mostrarToast(msg) {
  let t = document.getElementById('toast-msg');
  if (!t) { t = document.createElement('div'); t.id='toast-msg'; document.body.appendChild(t); }
  t.textContent = msg;
  t.className = 'toast-show';
  setTimeout(() => t.className = '', 2500);
}
function restablecerCambios(){
  if(cambios.length === 0 && !localStorage.getItem('lup_rutas_autosave')){
    mostrarToast('No hay cambios que restablecer');
    return;
  }
  if(!confirm('¿Seguro que quieres restablecer todo? Se perderán ' + cambios.length + ' cambio(s) pendientes.')){return;}
  // Resetear workingData desde ANTES_DATA
  workingData = JSON.parse(JSON.stringify(ANTES_DATA));
  cambios = [];
  selected.clear();
  localStorage.removeItem('lup_rutas_autosave');
  // Limpiar versiones guardadas también si el usuario quiere
  updateCambiosPanel();
  renderMap();
  mostrarToast('✅ Restablecido a estado original');
}

// Auto-guardar cada vez que se aplica un cambio
const _origApplyEdit = applyEdit;
applyEdit = function() {
  _origApplyEdit();
  // auto-save silencioso en key temporal
  try {
    localStorage.setItem('lup_rutas_autosave', JSON.stringify({
      ts: new Date().toISOString(),
      workingData: workingData,
      cambios: cambios
    }));
  } catch(e){}
};
// Restaurar autosave si hay uno reciente (< 2 horas)
(function restoreAutosave(){
  try {
    const raw = localStorage.getItem('lup_rutas_autosave');
    if (!raw) return;
    const saved = JSON.parse(raw);
    const age = (Date.now() - new Date(saved.ts).getTime()) / 60000; // minutos
    if (age < 120 && saved.cambios && saved.cambios.length > 0) {
      if (confirm('Hay ' + saved.cambios.length + ' cambio(s) sin guardar de hace ' + Math.round(age) + ' min. ¿Restaurar?')) {
        workingData = saved.workingData;
        cambios = saved.cambios;
        updateCambiosPanel();
        renderMap();
        mostrarToast('♻️ Sesión restaurada');
      }
    }
  } catch(e){}
})();

</script>
